<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0e0d0b;
  color: #f0ede8;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}

.page {
  display: flex;
  min-height: 100vh;
  opacity: 0;
  position: absolute;
  width: 100%;
  top: 0; left: 0;
  pointer-events: none;
  transition: opacity 0.7s ease;
}

.page.active {
  opacity: 1;
  position: relative;
  pointer-events: all;
}

.photo-side {
  width: 55%;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.photo-side img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  position: absolute;
  top: 0; left: 0;
}

.photo-placeholder {
  width: 100%;
  height: 100%;
  min-height: 100vh;
  background: #1a1814;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: #4a4640;
  border-right: 0.5px solid #2a2820;
}

.photo-placeholder i { font-size: 40px; }
.photo-placeholder p { font-size: 13px; letter-spacing: 0.05em; }

.text-side {
  width: 45%;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 52px;
  background: #0e0d0b;
  position: relative;
}

.chapter {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #6b6560;
  margin-bottom: 28px;
}

.page-title {
  font-family: 'Playfair Display', serif;
  font-size: 2.6rem;
  font-weight: 600;
  line-height: 1.2;
  color: #f0ede8;
  margin-bottom: 28px;
}

.page-title em {
  font-style: italic;
  font-weight: 400;
  color: #c9a96e;
}

.page-body {
  font-size: 15px;
  line-height: 1.85;
  color: #a09890;
  font-weight: 300;
  max-width: 380px;
}

.page-body p { margin-top: 14px; }
.page-body p:first-child { margin-top: 0; }

.divider {
  width: 32px;
  height: 1px;
  background: #c9a96e;
  margin: 28px 0;
  opacity: 0.6;
}

.nav-row {
  position: fixed;
  bottom: 36px;
  right: 52px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 100;
}

.nav-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 0.5px solid #3a3830;
  background: transparent;
  color: #a09890;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}

.nav-btn:hover {
  border-color: #c9a96e;
  color: #c9a96e;
}

.nav-btn:disabled {
  opacity: 0.2;
  cursor: default;
}

.page-counter {
  font-size: 12px;
  color: #4a4640;
  letter-spacing: 0.1em;
  min-width: 40px;
  text-align: center;
}

.dots {
  position: fixed;
  bottom: 44px;
  left: 0;
  width: 55%;
  display: flex;
  justify-content: center;
  gap: 8px;
  z-index: 100;
}

.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #3a3830;
  transition: background 0.3s;
}

.dot.active {
  background: #c9a96e;
}
</style>
</head>
<body>

<div id="pages"></div>
<div class="dots" id="dots"></div>

<div class="nav-row">
  <button class="nav-btn" id="prevBtn" onclick="go(-1)" disabled aria-label="Previous"><i class="ti ti-arrow-left"></i></button>
  <span class="page-counter" id="counter">1 / 6</span>
  <button class="nav-btn" id="nextBtn" onclick="go(1)" aria-label="Next"><i class="ti ti-arrow-right"></i></button>
</div>

<script>
// ─────────────────────────────────────────────
//  EDIT YOUR SLIDES HERE
//  img: path to your image file, e.g. "images/cover.jpg"
//       set img to "" if you have no image for that slide
//  title: big heading — wrap a word in <em> for gold italic style
//  body: your text — use \n\n for a new paragraph
// ─────────────────────────────────────────────
const slides = [
  {
    chapter: "Chapter one",
    title: "Happy Birthday <em>❤️</em>",
      body: `
    <p>To the little girl in this photo,</p>

    <p>You had no idea where life would take you, how many people you would make smile, or how strong you would become. But looking at this picture, I can already see the kindness, innocence, and beautiful heart that still exists today.</p>

    <p>Happy Birthday to the little girl who grew into someone truly special.</p>
  `,
    img: "images/first slide.jpg"
  },
  {
    chapter: "Chapter two",
    title: "Growing Up",
    body: `
  <p>Every year added something beautiful to you.</p>

  <p>A little more courage.<br>
  A little more wisdom.<br>
  A little more strength.</p>

  <p>Life changed around you, but your warmth, your smile, and your caring heart never disappeared.</p>

  <p>I'm proud of the person you became.</p>
`,
    img: "images/second slide.jpg"
  },
  {
    chapter: "Chapter three",
    title: "Some Favourite Moments <em>❤️</em>",
    body: `
  <p>Behind every photograph is a story nobody else can fully see.</p>

  <p>The hard days.<br>
  The dreams.<br>
  The fears.<br>
  The moments when you kept going even when things were difficult.</p>

  <p>You have always been stronger than you give yourself credit for.</p>

  <p>Never forget that.</p>
`,
    img: "images/third slide.jpg"
  },
  {
    chapter: "Chapter four",
    title: "Kathmandu <em>✈️</em>",
    body: `
  <p>Eventyally one day, you packed your dreams and stepped into a new city.</p>

  <p>That takes courage.</p>

  <p>You left the comfort of home, faced new challenges, met new people, and built a life of your own.</p>

  <p>The girl in these photos became a woman who keeps moving forward no matter what.</p>

  <p>That is something worth celebrating.</p>
`,
    img: "images/fourth slide.jpg"
  },
  {
    chapter: "Chapter five",
    title: "What I Admire",
    body: `
  <p>Today, I hope you see yourself the way the people who loves you have seen you.</p>

  <p>Someone who brings laughter.<br>
  Someone who cares deeply.<br>
  Someone who makes ordinary moments feel special.</p>

  <p>Your presence makes the world warmer for the people around you.</p>

  <p>Never doubt your worth.</p>
`,
    img: "images/fifth slide.jpg"
  },
  {
    chapter: "Chapter six",
    title: "For The Year <em>Ahead</em>",
    body: `
  <p>Happy Birthday, my love.</p>

  <p>Today is not just a celebration of another year. It is a celebration of every version of you that existed before today — the little girl, the dreamer, the student, the fighter, and the woman you are becoming.</p>

  <p>May this year bring you happiness, peace, beautiful memories, and everything your heart quietly wishes for.</p>

  <p>You deserve to feel loved. You deserve to feel appreciated. And today, more than anything, you deserve to feel special.</p>

  <p>Happy Birthday Pranu❤️</p>
`,
    img: "images/sixth slide.jpg"
  }
];
// ─────────────────────────────────────────────

const container = document.getElementById('pages');
const dotsEl = document.getElementById('dots');
let current = 0;

slides.forEach((s, i) => {
  const page = document.createElement('div');
  page.className = 'page' + (i === 0 ? ' active' : '');

  const bodyHtml = s.body
    .split('\n\n')
    .map(p => `<p>${p}</p>`)
    .join('');

  page.innerHTML = `
    <div class="photo-side">
      ${s.img
        ? `<img src="${s.img}" alt="">`
        : `<div class="photo-placeholder"><i class="ti ti-photo"></i><p>Add your photo here</p></div>`
      }
    </div>
    <div class="text-side">
      <p class="chapter">${s.chapter}</p>
      <h1 class="page-title">${s.title}</h1>
      <div class="divider"></div>
      <div class="page-body">${bodyHtml}</div>
    </div>
  `;

  container.appendChild(page);

  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dotsEl.appendChild(dot);
});

const pages = document.querySelectorAll('.page');
const dots = document.querySelectorAll('.dot');

function go(dir) {
  pages[current].classList.remove('active');
  dots[current].classList.remove('active');
  current = Math.max(0, Math.min(slides.length - 1, current + dir));
  pages[current].classList.add('active');
  dots[current].classList.add('active');
  document.getElementById('counter').textContent = `${current + 1} / ${slides.length}`;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === slides.length - 1;
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
});
</script>

</body>
</html>
